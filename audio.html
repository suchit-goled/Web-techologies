<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video and Audio Player</title>
</head>

<body>

    <h2>iframe</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/xNR4FAEGxV4?si=TIW0lUnwO1GMtxGd"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <h2>Video Player</h2>
    <video width="700" controls>
        <source src="./Munjane Manjalli  Audio Song  Just Maath Maathali  Kiccha Sudeep  Ramya  Raghu Dixit.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <br><br>

    <h2>Audio Player</h2>

    <audio controls>
        <source src="./Munjane Manjalli  Audio Song  Just Maath Maathali  Kiccha Sudeep  Ramya  Raghu Dixit.mp3" type="audio/mp3">
        Your browser does not support the audio tag.
    </audio>

</body>

</html>
